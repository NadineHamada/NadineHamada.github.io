<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

{%- include head.html -%}

<body>

  <header class="site-nav">
    <div class="wrapper">
      <a class="site-nav-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </div>
    <div class="profile-header">
  <img src="/assets/images/nadine.png" alt="Profile photo" class="profile-photo">
  <div class="profile-text">
    <h1>Nadine Hamada</h1>
    <p class="tagline">ML/AI researcher — quantum-inspired NLP</p>
    <div class="profile-links">
      <a href="https://github.com/NadineHamada">GitHub</a>
      <a href="https://orcid.org/0009-0009-6349-4080">ORCID</a>
      <a href="https://linkedin.com/in/nadinehamada">LinkedIn</a>
      <a href="https://arxiv.org/a/yourname">arXiv</a>
    </div>
  </div>
</div>

<hr class="section-divider">

  </header>

  <main class="page-content" aria-label="Content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer-custom">
    <div class="wrapper">
      <div class="footer-links">
        <a href="https://github.com/NadineHamada">GitHub</a>
        <a href="https://orcid.org/0009-0009-6349-4080">ORCID</a>
        <a href="https://linkedin.com/in/nadinehamada">LinkedIn</a>
        <a href="https://arxiv.org/a/yourname">arXiv</a>
      </div>
      <p class="footer-note">&copy; {{ 'now' | date: "%Y" }} {{ site.title }}</p>
    </div>
  </footer>

</body>

</html>
